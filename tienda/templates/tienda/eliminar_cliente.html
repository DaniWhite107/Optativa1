{% extends "tienda/base.html" %}

{% block title %}Eliminar cliente{% endblock %}

{% block content %}
    <h1>Eliminar cliente</h1>
    <p>¿Estás seguro de que quieres eliminar al cliente "{{ cliente.nombre }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'tienda:detalle_cliente' pk=cliente.pk %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock %}
