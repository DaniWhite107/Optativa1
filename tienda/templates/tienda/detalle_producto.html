{% extends "tienda/base.html" %} 
{% block title %}{{ producto.nombre }}{% endblock %}

{% block content %}
<h1>{{ producto.nombre }}</h1>
<p>{{ producto.descripcion }}</p>
<p><strong>Precio:</strong> ${{ producto.precio|floatformat:2 }}</p>
<p>
  <a class="btn primary" href="{% url 'tienda:editar_producto' producto.pk %}">Editar producto</a>

  <a class="btn delete" href="{% url 'tienda:delete_producto' producto.pk %}">Eliminar producto</a>
</p>
{% endblock %}
